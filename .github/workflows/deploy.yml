name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Validate required secrets
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ENABLED_ORIGINS: ${{ secrets.ENABLED_ORIGINS }}
        run: |
          missing=0
          required_vars=(
            GCP_SERVICE_ACCOUNT_KEY
            GCP_REGION
            GCP_PROJECT_ID
            ARTIFACT_REGISTRY
            IMAGE_NAME
            SERVICE_NAME
            YOUTUBE_API_KEY
            ENABLED_ORIGINS
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done

          if [[ "$missing" -eq 1 ]]; then
            echo "One or more required secrets are missing. Check repository secrets in GitHub Actions settings."
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.SERVICE_NAME }} \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --set-env-vars="^##^API_KEY=${{ secrets.YOUTUBE_API_KEY }}##ENABLED_ORIGINS=${{ secrets.ENABLED_ORIGINS }}" \
            --allow-unauthenticated